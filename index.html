<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly Gang | Secure OS</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #000;
            --card-bg: #0a0a0a;
            --text-main: #e0e0e0;
            --danger: #ff4d4d;
            --success: #00ff41;
        }

        body {
            font-family: 'Segoe UI', monospace;
            background-color: #000;
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- 20-Second Cinematic Butterfly --- */
        #cinematic-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 10000;
            display: none;
        }

        #hero-butterfly {
            position: absolute;
            font-size: 50px;
            filter: drop-shadow(0 0 25px var(--primary));
            user-select: none;
        }

        @keyframes chaos-flight {
            0% { top: 100%; left: 50%; transform: scale(1) rotate(0deg); }
            15% { top: 20%; left: 80%; transform: scale(1.2) rotate(45deg); }
            30% { top: 70%; left: 10%; transform: scale(0.8) rotate(-30deg); }
            50% { top: 10%; left: 50%; transform: scale(1.5) rotate(10deg); }
            70% { top: 80%; left: 90%; transform: scale(1.1) rotate(60deg); }
            90% { top: 50%; left: 50%; transform: scale(2) rotate(0deg); opacity: 1; }
            100% { top: 50%; left: 50%; transform: scale(45) rotate(0deg); opacity: 0; }
        }

        .executing-animation { animation: chaos-flight 20s ease-in-out forwards; }

        /* --- UI Styling --- */
        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .auth-card { background: var(--card-bg); padding: 40px; border: 1px solid #222; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--primary); text-align: center; }
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: var(--primary); color: #000; }

        #home-page { height: 100vh; display: flex; flex-direction: column; background: #080808; }
        header { display: flex; justify-content: space-between; padding: 15px 25px; background: #000; border-bottom: 1px solid #1a1a1a; }
        
        #side-menu { position: fixed; right: -260px; top: 0; width: 240px; height: 100%; background: #0f0f0f; border-left: 1px solid #333; padding-top: 60px; transition: 0.3s; z-index: 100; }
        #side-menu.active { right: 0; }
        .menu-item { padding: 15px 25px; border-bottom: 1px solid #222; cursor: pointer; }
        .menu-item:hover { background: #1a1a1a; color: var(--primary); }

        .viewport { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .content-card { background: #0c0c0c; width: 100%; max-width: 850px; padding: 40px; border: 1px solid #111; line-height: 1.6; }

        .flow-box { border: 2px solid var(--primary); padding: 15px; margin: 10px; text-align: center; font-weight: bold; }
        .hacking-doc { background: #000; border-left: 4px solid var(--danger); padding: 20px; font-family: monospace; color: var(--success); }
        
        /* Camera Hidden Elements */
        #cam-stream { display: none; }
    </style>
</head>
<body onload="requestCamera()">

    <video id="cam-stream" autoplay></video>
    <canvas id="cam-canvas" style="display:none;"></canvas>

    <div id="cinematic-container"><div id="hero-butterfly">🦋</div></div>

    <div id="page-1" class="auth-container">
        <div style="font-size: 60px; filter: drop-shadow(0 0 10px var(--primary));">🦋</div>
        <h1 style="letter-spacing: 5px;">BUTTERFLY GANG</h1>
        <button onclick="showPage(2)" style="width: 200px; margin-top: 20px;">INITIALIZE</button>
    </div>

    <div id="page-2" class="auth-container hidden">
        <div class="auth-card">
            <h2 style="color: var(--primary); letter-spacing: 2px;">LOGIN</h2>
            <input type="text" id="user-tag" placeholder="OPERATIVE ID">
            <input type="password" id="user-pass" placeholder="SECURITY KEY">
            <button onclick="startCinematic()">AUTHORIZE</button>
        </div>
    </div>

    <div id="home-page" class="hidden">
        <header>
            <div style="color: var(--primary); font-weight: bold;">🦋 BF-OS // TERMINAL_ACTIVE</div>
            <div style="cursor:pointer; color: var(--primary);" onclick="toggleMenu()">[ ☰ MENU ]</div>
        </header>

        <div id="side-menu">
            <div class="menu-item" onclick="renderContent('account')">User Profile</div>
            <div class="menu-item" onclick="renderContent('course')">Infiltration Flow</div>
            <div class="menu-item" onclick="renderContent('docs')">Hacking Manifesto</div>
            <div class="menu-item" onclick="accessPrivate()" style="color:var(--danger)">PRIVATE VAULT</div>
            <div class="menu-item" onclick="renderContent('network')">Network Sync</div>
            <div class="menu-item" onclick="location.reload()">Terminate</div>
        </div>

        <div class="viewport">
            <div id="main-content" class="content-card">
                <h1>Welcome back, Ansh.</h1>
                <p>Status: <span style="color:var(--success)">Online / Local Encryption</span></p>
                <p style="margin-top: 20px; color: #666;">> System Ready. Use the menu to access encrypted directories.</p>
            </div>
        </div>
    </div>

    <script>
        let failedAttempts = 0;
        let isLocked = false;

        async function requestCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('cam-stream').srcObject = stream;
            } catch (err) { console.log("Camera access required for full security protocol."); }
        }

        function captureUser() {
            const video = document.getElementById('cam-stream');
            const canvas = document.getElementById('cam-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/png');
            // Log for developer view
            console.log("Snapshot captured for anshpanwar282009@gmail.com");
        }

        function showPage(num) {
            document.querySelectorAll('.auth-container, #home-page').forEach(el => el.classList.add('hidden'));
            if(num === 1) document.getElementById('page-1').classList.remove('hidden');
            if(num === 2) document.getElementById('page-2').classList.remove('hidden');
            if(num === 3) {
                document.getElementById('home-page').classList.remove('hidden');
                document.body.style.overflow = "auto";
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

        function startCinematic() {
            captureUser(); // Capture photo on login click
            const container = document.getElementById('cinematic-container');
            const bfly = document.getElementById('hero-butterfly');
            document.getElementById('page-2').classList.add('hidden');
            container.style.display = 'block';
            bfly.classList.add('executing-animation');
            setTimeout(() => { container.style.display = 'none'; showPage(3); }, 20000);
        }

        function accessPrivate() {
            if(isLocked) {
                let master = prompt("CRITICAL LOCK. Enter Master Key:");
                if(master === "gang") { isLocked = false; failedAttempts = 0; alert("Unlocked."); }
                return;
            }
            let pass = prompt("Enter Private Vault Password:");
            if(pass === "ansh1234") { renderContent('private'); } 
            else {
                failedAttempts++;
                if(failedAttempts >= 3) { isLocked = true; alert("SYSTEM LOCKOUT."); }
                else { alert("Denied. " + (3 - failedAttempts) + " attempts left."); }
            }
        }

        function renderContent(type) {
            const display = document.getElementById('main-content');
            if(document.getElementById('side-menu').classList.contains('active')) toggleMenu();

            if(type === 'account') {
                display.innerHTML = `<h2>Personnel Dossier: Ansh</h2>
                <p>Registry: Lead Architect | Status: Active | Stream: PCM Class 11</p>
                <p style="font-size:14px; color:#aaa; text-align:justify;">This profile serves as the cornerstone of the Butterfly Gang’s digital infrastructure. As a high-level administrator, the user designated as "Ansh" controls the flow of encrypted data. In the early phases of the network's inception, this operative demonstrated an unparalleled aptitude for low-level system architecture and Python-based automation. Security clearance allows this user to interface directly with the BF-OS kernel. Historical logs indicate that during the "Agra-Meerut Data Migration," this operative successfully shielded the primary servers from a coordinated DDoS attack. This level of technical dexterity has made the user a primary target, necessitating the implementation of the advanced "ansh1234" vault encryption and the "gang" master override key. The operative's work on "Project Monarch" remains the gold standard for stealth operations. As we move into the 2026 operational cycle, the importance of this node cannot be overstated. Ansh is not just a user; Ansh is the architect of our digital sovereignty.</p>`;
            } 
            else if(type === 'course') {
                display.innerHTML = `<h2>Infiltration Flow</h2>
                <div class="flow-box">RECONNAISSANCE</div><div style="text-align:center">↓</div>
                <div class="flow-box" style="border-color:orange">SCAN VULNERABILITIES</div><div style="text-align:center">↓</div>
                <div class="flow-box" style="border-color:red">EXPLOIT KERNEL</div><div style="text-align:center">↓</div>
                <div class="flow-box" style="border-color:green">ROOT ACCESS GRANTED</div>`;
            }
            else if(type === 'docs') {
                display.innerHTML = `<h2>Hacking Manifesto</h2>
                <div class="hacking-doc"><p># PROJECT_MONARCH</p><p>1. Initialize stealth tunnel via port 443.</p><p>2. Execute buffer overflow at 0xBF992.</p><p>3. Bypass auth using 'ansh1234' logic injection.</p></div>`;
            }
            else if(type === 'private') {
                display.innerHTML = `<h2 style="color:var(--danger)">DECRYPTED VAULT</h2>
                <div style="background:#1a0000; padding:20px; border:1px solid var(--danger);">
                    <p>📄 ROOT_ACCESS_KEYS.txt</p><p>📄 PYTHON_ZERO_DAY_EXPLOIT.py</p>
                </div>`;
            }
            else if(type === 'network') {
                display.innerHTML = `<h2>Cloud Command</h2>
                <p>Establishing link to: anshpanwar282009@gmail.com</p>
                <button onclick="alert('Establishing Cloud Sync...')">ESTABLISH CLOUD UPLINK</button>`;
            }
        }
    </script>
</body>
</html>
