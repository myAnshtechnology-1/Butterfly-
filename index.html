<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly Gang | Secure OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #000;
            --card-bg: #0a0a0a;
            --text-main: #e0e0e0;
            --danger: #ff4d4d;
            --success: #00ff41;
        }

        body {
            font-family: 'Segoe UI', monospace;
            background-color: #000;
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- 20-Second Cinematic Animation --- */
        #cinematic-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 10000;
            display: none;
        }

        #hero-butterfly {
            position: absolute;
            font-size: 50px;
            filter: drop-shadow(0 0 25px var(--primary));
            user-select: none;
        }

        @keyframes chaos-flight {
            0% { top: 100%; left: 50%; transform: scale(1) rotate(0deg); }
            15% { top: 20%; left: 80%; transform: scale(1.2) rotate(45deg); }
            30% { top: 70%; left: 10%; transform: scale(0.8) rotate(-30deg); }
            50% { top: 10%; left: 50%; transform: scale(1.5) rotate(10deg); }
            70% { top: 80%; left: 90%; transform: scale(1.1) rotate(60deg); }
            90% { top: 50%; left: 50%; transform: scale(2) rotate(0deg); opacity: 1; }
            100% { top: 50%; left: 50%; transform: scale(45) rotate(0deg); opacity: 0; }
        }

        .executing-animation { animation: chaos-flight 20s ease-in-out forwards; }

        /* --- UI Styling --- */
        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .auth-card { background: var(--card-bg); padding: 40px; border: 1px solid #222; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--primary); text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 5px; }
        button:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        #home-page { height: 100vh; display: flex; flex-direction: column; background: #080808; }
        header { display: flex; justify-content: space-between; padding: 15px 25px; background: #000; border-bottom: 1px solid #1a1a1a; }
        
        #side-menu { position: fixed; right: -260px; top: 0; width: 240px; height: 100%; background: #0f0f0f; border-left: 1px solid #333; padding-top: 60px; transition: 0.3s; z-index: 100; }
        #side-menu.active { right: 0; }
        .menu-item { padding: 15px 25px; border-bottom: 1px solid #222; cursor: pointer; }
        .menu-item:hover { background: #1a1a1a; color: var(--primary); }

        .viewport { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .content-card { background: #0c0c0c; width: 100%; max-width: 850px; padding: 40px; border: 1px solid #111; line-height: 1.6; }

        .flow-box { border: 2px solid var(--primary); padding: 15px; margin: 10px; text-align: center; font-weight: bold; }
        .hacking-doc { background: #000; border-left: 4px solid var(--danger); padding: 20px; font-family: monospace; color: var(--success); }
    </style>
</head>
<body>

    <audio id="boot-sound" src="https://codeskulptor-demos.commondatastorage.googleapis.com/pang/arrow.mp3" preload="auto"></audio>
    <div id="cinematic-container"><div id="hero-butterfly">🦋</div></div>

    <div id="page-1" class="auth-container">
        <div style="font-size: 80px; filter: drop-shadow(0 0 15px var(--primary));">🦋</div>
        <h1 style="letter-spacing: 5px; margin-top: 20px;">BUTTERFLY GANG</h1>
        <button onclick="showPage(2)" style="width: 200px; margin-top: 20px;">INITIALIZE KERNEL</button>
    </div>

    <div id="page-2" class="auth-container hidden">
        <div class="auth-card">
            <h2 style="color: var(--primary); letter-spacing: 2px;">SECURE ACCESS</h2>
            <input type="email" id="user-email" placeholder="OPERATIVE EMAIL">
            <input type="password" id="user-pass" placeholder="SECURITY KEY">
            <button onclick="handleLogin()">AUTHORIZE LOGIN</button>
            <button onclick="handleSignup()" style="border-color: #555; color: #888; font-size: 11px;">REGISTER NEW OPERATIVE</button>
        </div>
    </div>

    <div id="home-page" class="hidden">
        <header>
            <div style="color: var(--primary); font-weight: bold;">🦋 BF-OS // LIVE_STATION</div>
            <div style="cursor:pointer; color: var(--primary);" onclick="toggleMenu()">[ ☰ MENU ]</div>
        </header>

        <div id="side-menu">
            <div class="menu-item" onclick="renderContent('account')">User Profile</div>
            <div class="menu-item" onclick="renderContent('course')">Infiltration Flow</div>
            <div class="menu-item" onclick="renderContent('docs')">Hacking Manifesto</div>
            <div class="menu-item" onclick="accessPrivate()" style="color:var(--danger)">PRIVATE VAULT</div>
            <div class="menu-item" onclick="renderContent('network')">Network Sync</div>
            <div class="menu-item" onclick="location.reload()">Terminate Session</div>
        </div>

        <div class="viewport">
            <div id="main-content" class="content-card">
                <h1>Welcome back, Operative.</h1>
                <p>Status: <span style="color:var(--success)">Online / Cloud Authenticated</span></p>
                <p style="margin-top: 20px; color: #888;">> Authentication successful. Secure directory unlocked.</p>
            </div>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://jlafjoxokkrwxxvlebxr.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_aRtqKsywWZDkHTI_asvNgQ_2UsnKICV';
        const supabase_client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let failedAttempts = 0;
        let isLocked = false;

        // AUTH LOGIC
        async function handleSignup() {
            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-pass').value;
            const { data, error } = await supabase_client.auth.signUp({ email, password });
            if (error) alert("ERROR: " + error.message);
            else alert("OPERATIVE REGISTERED. You can now login.");
        }

        async function handleLogin() {
            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-pass').value;
            const { data, error } = await supabase_client.auth.signInWithPassword({ email, password });
            if (error) alert("ACCESS DENIED: " + error.message);
            else startCinematic();
        }

        // NAVIGATION
        function showPage(num) {
            document.querySelectorAll('.auth-container, #home-page').forEach(el => el.classList.add('hidden'));
            if(num === 1) document.getElementById('page-1').classList.remove('hidden');
            if(num === 2) document.getElementById('page-2').classList.remove('hidden');
            if(num === 3) {
                document.getElementById('home-page').classList.remove('hidden');
                document.body.style.overflow = "auto";
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

        function startCinematic() {
            const sound = document.getElementById('boot-sound');
            if(sound) sound.play().catch(() => {});
            const container = document.getElementById('cinematic-container');
            const bfly = document.getElementById('hero-butterfly');
            document.getElementById('page-2').classList.add('hidden');
            container.style.display = 'block';
            bfly.classList.add('executing-animation');
            setTimeout(() => { container.style.display = 'none'; showPage(3); }, 20000);
        }

        // VAULT LOGIC
        function accessPrivate() {
            if(isLocked) {
                let master = prompt("CRITICAL LOCKOUT. Enter Master Key:");
                if(master === "gang") { isLocked = false; failedAttempts = 0; alert("Unlocked."); }
                return;
            }
            let pass = prompt("Enter Vault Password:");
            if(pass === "ansh1234") { renderContent('private'); } 
            else {
                failedAttempts++;
                if(failedAttempts >= 3) { isLocked = true; alert("SYSTEM LOCKED."); }
                else { alert("Denied. " + (3 - failedAttempts) + " left."); }
            }
        }

        // CONTENT RENDERING
        function renderContent(type) {
            const display = document.getElementById('main-content');
            if(document.getElementById('side-menu').classList.contains('active')) toggleMenu();

            if(type === 'account') {
                display.innerHTML = `<h2>Personnel Dossier: Ansh</h2>
                <p><strong>Registry:</strong> Lead Architect | <strong>Class:</strong> 11 PCM | <strong>Location:</strong> Meerut</p>
                <p style="font-size:14px; color:#aaa; text-align:justify;">This profile serves as the cornerstone of the Butterfly Gang’s digital infrastructure. As a high-level administrator within the 11th Sector, the user designated as "Ansh" controls the flow of encrypted data across the sub-mesh. Identity confirmed via cloud kernel.</p>`;
            } 
            else if(type === 'course') {
                display.innerHTML = `<h2>Infiltration Lifecycle</h2>
                <div class="flow-box">RECONNAISSANCE</div><div style="text-align:center">↓</div>
                <div class="flow-box" style="border-color:orange">VULNERABILITY SCAN</div><div style="text-align:center">↓</div>
                <div class="flow-box" style="border-color:red">EXPLOIT KERNEL</div><div style="text-align:center">↓</div>
                <div class="flow-box" style="border-color:green">ROOT ACCESS GRANTED</div>`;
            }
            else if(type === 'docs') {
                display.innerHTML = `<h2>Hacking Manifesto: Project Monarch</h2>
                <div class="hacking-doc">
                    <p># TARGET: Global Centralized Databases</p>
                    <p>1. Initialize stealth tunnel via port 443.</p>
                    <p>2. Execute buffer overflow at 0xBF992.</p>
                    <p>3. Bypass auth using logic injection.</p>
                </div>`;
            }
            else if(type === 'private') {
                display.innerHTML = `<h2 style="color:var(--danger)">DECRYPTED VAULT</h2>
                <p>ACCESS KEY: ansh1234 [VERIFIED]</p>
                <div style="background:#1a0000; padding:20px; border:1px solid var(--danger);">
                    <p>📄 ROOT_ACCESS_KEYS.txt</p>
                    <p>📄 PYTHON_ZERO_DAY_EXPLOIT.py</p>
                    <p>📄 NETWORK_TOPOLOGY_v4.pdf</p>
                </div>`;
            }
            else if(type === 'network') {
                display.innerHTML = `<h2>Cloud Sync Control</h2>
                <p>Uplink Target: Active Cloud Database</p>
                <button onclick="alert('Synchronizing local buffers to Supabase Cloud...')">CHECK UPLINK</button>`;
            }
        }
    </script>
</body>
                </html>
